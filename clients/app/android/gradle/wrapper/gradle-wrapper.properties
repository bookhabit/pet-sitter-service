# ─────────────────────────────────────────────────────────────────────────────
# gradle-wrapper.properties — Gradle Wrapper 설정
#
# Gradle Wrapper: 팀원마다 Gradle을 직접 설치하지 않아도 되도록,
# 프로젝트가 지정한 Gradle 버전을 자동으로 다운로드·사용하게 해주는 도구.
# ./gradlew 실행 시 이 파일을 읽어 distributionUrl에서 Gradle을 받아옴.
# ─────────────────────────────────────────────────────────────────────────────

# 다운로드된 Gradle 압축 파일을 저장할 기준 경로
# GRADLE_USER_HOME = 기본적으로 ~/.gradle
distributionBase=GRADLE_USER_HOME

# distributionBase 기준 하위 저장 경로
# 실제 경로: ~/.gradle/wrapper/dists/
distributionPath=wrapper/dists

# 다운로드할 Gradle 배포 URL
# -bin: 실행 파일만 포함 (CI/빌드 서버 권장, 용량 절감)
# -all: 소스코드 + 문서 포함 (IDE 자동완성용 — Android Studio 권장)
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip

# 네트워크 다운로드 타임아웃 (밀리초). 느린 네트워크 환경 대비.
networkTimeout=10000

# 다운로드된 Gradle zip 파일의 체크섬(URL) 검증 활성화.
# 위변조된 파일 사용을 방지.
validateDistributionUrl=true

# 압축 해제된 Gradle 파일을 저장할 기준 경로
zipStoreBase=GRADLE_USER_HOME

# zipStoreBase 기준 하위 저장 경로
zipStorePath=wrapper/dists
